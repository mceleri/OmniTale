name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Si attiva quando i cambiamenti vengono uniti nel ramo 'main'

permissions:
  contents: write  # Consente all'azione di scrivere nel ramo automatico gh-pages

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
